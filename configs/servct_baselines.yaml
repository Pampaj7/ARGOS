benchmark:
  name: servct_reference_ct
  dataset_root: ../dataset/SERVCT
  reference: Reference_CT
  frames: 16

outputs:
  workspace: ..
  scoreboard_dir: ../results

runs:
  - name: sgbm
    model: OpenCV SGBM
    status: tested
    summary: ../external/frame_stereo_repos/Fast-FoundationStereo/output_servct_eval_sgbm/summary.json
  - name: fast_foundationstereo_onnx
    model: Fast-FoundationStereo ONNX
    status: tested
    summary: ../external/frame_stereo_repos/Fast-FoundationStereo/output_servct_eval/summary.json
  - name: s2m2_s
    model: S2M2-S
    status: tested
    summary: ../external/frame_stereo_repos/s2m2/output_servct_eval_s2m2_S/summary.json
  - name: s2m2_m
    model: S2M2-M
    status: tested
    summary: ../external/frame_stereo_repos/s2m2/output_servct_eval_s2m2_M/summary.json
  - name: monsterpp_mixall_large
    model: MonSter++ MixAll large
    status: tested
    summary: ../external/frame_stereo_repos/MonSter-plusplus/MonSter++/output_servct_eval_monsterpp_mixall_i16/summary.json
  - name: raft_stereo_rvc
    model: RAFT-Stereo RVC
    status: tested
    summary: ../external/frame_stereo_repos/RAFT-Stereo/output_servct_eval_raft_rvc/summary.json
  - name: crestereo
    model: CREStereo
    status: tested
    summary: ../external/frame_stereo_repos/stereo_matching_crestereo/output_servct_eval_crestereo/summary.json
